apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend-deployment
spec:
  selector:
    matchLabels:
      app: voiture-frontend
  replicas: 1
  template:
    metadata:
      labels:
        app: voiture-frontend
    spec:
      containers:
        - name: voiture-frontend
          image: voiture-frontend:1.0
          imagePullPolicy: Never
          ports:
            - containerPort: 80

---
apiVersion: v1
kind: Service
metadata:
  name: frontend-svc
spec:
  selector:
    app: voiture-frontend
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
  type: NodePort